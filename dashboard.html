<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL: TOTAL RUINATION v2.8.0 (ELITE ROSTER)</title>
    <style>
        :root { --blue: #1d9bf0; --red: #ff4d4d; --gold: #ffd700; --green: #28a745; --purple: #a020f0; --orange: #ff7b00; --bg: #000; --panel: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        @keyframes pulseRed { 0% { box-shadow: inset 0 0 10px #f00; } 50% { box-shadow: inset 0 0 100px #f00; } 100% { box-shadow: inset 0 0 10px #f00; } }
        .ruining-active { animation: pulseRed 2s infinite; }
        .distraction-flash { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.9) !important; transition: 0.2s; }
        
        .top-bar { background: var(--panel); border-bottom: 1px solid #222; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .stat h2 { margin: 0; font-family: monospace; font-size: 1.8rem; }
        .stat p { margin: 0; font-size: 0.65rem; color: #666; text-transform: uppercase; }
        
        .main-container { display: grid; grid-template-columns: 220px 280px 1fr 320px; flex-grow: 1; overflow: hidden; }
        
        .burn-log { background: #030303; border-right: 1px solid #222; overflow-y: auto; font-family: monospace; font-size: 0.7rem; padding: 10px; color: #444; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-entry.negative { color: var(--red); }
        .log-entry.positive { color: #0f0; }

        .inbox { background: #050505; border-right: 1px solid #222; overflow-y: auto; }
        .inbox-item { padding: 12px; border-bottom: 1px solid #111; cursor: pointer; border-left: 4px solid transparent; display: flex; align-items: center; transition: 0.2s; }
        .inbox-item img { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; object-fit: cover; border: 1px solid #333; }
        .inbox-item.active { background: #0d1926; border-left-color: var(--blue); }
        .inbox-item.ping { border-left-color: var(--red); background: rgba(255,0,0,0.3); animation: blink 0.5s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .chat-section { display: flex; flex-direction: column; border-right: 1px solid #222; position: relative; height: 100%; overflow: hidden; }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: scroll; display: flex; flex-direction: column; gap: 12px; background: #000; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; padding: 12px; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #111; color: #666; border: 1px solid #222; }
        .dom-msg { align-self: flex-start; background: #001a2c; color: #e0e0e0; border-left: 4px solid var(--blue); }
        
        .command-panel { background: #050505; padding: 20px; display: flex; flex-direction: column; text-align: center; }
        #task-display { font-size: 1rem; font-weight: bold; color: var(--gold); background: #111; padding: 15px; border-radius: 8px; min-height: 120px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; }
        #timer { font-size: 4rem; font-family: monospace; color: var(--red); margin: 15px 0; }
        
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        #gen-btn { background: var(--blue); color: #fff; }
        #comp-btn { background: #222; color: #444; }
        
        #lockout { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body onload="init()">

    <div class="top-bar">
        <div class="stat"><p>Status</p><h2 id="sub-rank" style="color:var(--gold)">CONNECTING...</h2></div>
        <div class="stat"><p>Wallet</p><h2 id="bal" style="color:var(--blue)">$0.00</h2></div>
        <div class="stat"><p>Total Wasted</p><h2 id="waste" style="color:var(--red)">$0.00</h2></div>
    </div>

    <div class="main-container">
        <div class="burn-log"><div id="log-content"></div></div>
        <div class="inbox" id="inbox-list"></div>
        <div class="chat-section">
            <div id="chat-header" style="padding:15px; border-bottom:1px solid #222; background: #050505; font-weight: bold;"></div>
            <div id="chat-box"></div>
            <div style="padding:15px; display:flex; gap:10px; background:#0a0a0a;">
                <input type="text" id="chat-in" style="flex-grow:1; background:#000; border:1px solid #333; color:#fff; padding:12px;" placeholder="Say something pathetic..." onkeydown="if(event.key==='Enter') sendChat()">
                <button onclick="sendTribute(50)" style="background:var(--green); border:none; color:#fff; padding:0 15px; cursor:pointer;">$50</button>
            </div>
        </div>
        <div class="command-panel">
            <div id="task-display">READY FOR ORDERS</div>
            <div id="timer">00:00</div>
            <button id="gen-btn" class="btn" onclick="getTask()">RECEIVE ORDER</button>
            <button id="comp-btn" class="btn" onclick="completeTask()" disabled>LOCKED</button>
        </div>
    </div>

    <div id="lockout">
        <h1 style="color:red; font-size:3rem;">INSOLVENT WASTE</h1>
        <h2 id="work-clock" style="font-size:4rem; color:#fff; font-family:monospace;">01:00:00</h2>
        <div id="labor-box">
            <p id="phrase-to-type" style="color:var(--gold);">I am a bankrupt slave to my roster.</p>
            <input type="text" id="labor-input" style="width:300px; background:#000; color:#fff; border:1px solid #333; padding:12px;" onkeydown="checkLabor(event)">
        </div>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        const MODEL_ID = "llama-3.3-70b-versatile"; 

        const doms = [
            { handle: "@Sapnap", name: "Sapnap", pfp: "4491.png", color: "#ff7b00", persona: "Aggressive, arrogant streamer Master. Obsessed with his own power. Mocks your obsession with his feet. Demands you pay for the privilege of even looking at his face." },
            { handle: "@Roier", name: "Roier", pfp: "4493.png", color: "#ff00ff", persona: "Chaotic, mocking, and high-energy. Switches between Spanish and English to confuse you. Loves seeing your balance drop while laughing at your 'sissy' behavior." },
            { handle: "@RossLynch", name: "Ross Lynch", pfp: "ross.jpg", color: "#ffd700", persona: "Pure Hollywood Alpha. Cold, expensive, and unreachable. He views you as a walking ATM. His beauty is a tax you must pay every single day." },
            { handle: "@Cellbit", name: "Cellbit", pfp: "cellbit.jpg", color: "#5d3fd3", persona: "The Investigator. He deconstructs your mind. He wants to know why you're so pathetic. He makes you feel like an ant under a microscope." },
            { handle: "@fingoat7", name: "Master GOAT", pfp: "4462.jpg", color: "#ff4d4d", persona: "6ft 7 Alpha. Hostile, dismissive, and only speaks in terms of dollar amounts." },
            { handle: "@welshgodfeet", name: "WelshGodFeet", pfp: "4463.jpg", color: "#00ff00", persona: "Cocky 21-year-old. Loves his feet and hates your financial stability." }
        ];

        let balance = parseFloat(localStorage.getItem('fakeBalance')) || 1000;
        let wasted = parseFloat(localStorage.getItem('totalWasted')) || 0;
        let histories = JSON.parse(localStorage.getItem('chats')) || {};
        let activeHandle = localStorage.getItem('activeHandle') || doms[0].handle;
        let lockoutSeconds = parseInt(localStorage.getItem('lockoutTime')) || 0;
        let logs = JSON.parse(localStorage.getItem('burnLogs')) || [];
        let currentTaskObj = null, timer, lockoutTimer, pendingDistraction = null;

        function saveAll() {
            localStorage.setItem('fakeBalance', balance);
            localStorage.setItem('totalWasted', wasted);
            localStorage.setItem('chats', JSON.stringify(histories));
            localStorage.setItem('activeHandle', activeHandle);
            localStorage.setItem('lockoutTime', lockoutSeconds);
            localStorage.setItem('burnLogs', JSON.stringify(logs));
        }

        function addLog(msg, type) {
            logs.unshift({ msg: `[${new Date().toLocaleTimeString()}] ${msg}`, type: type });
            if(logs.length > 30) logs.pop();
            renderLogs();
        }

        function renderLogs() {
            document.getElementById('log-content').innerHTML = logs.map(l => `<div class="log-entry ${l.type}">${l.msg}</div>`).join('');
        }

        function init() {
            doms.forEach(d => { if(!histories[d.handle]) histories[d.handle] = []; });
            switchChat(activeHandle);
            updateUI();
            startDistractions();
            if (lockoutSeconds > 0) showLockout(true);
        }

        function updateUI() {
            document.getElementById('bal').innerText = `$${balance.toFixed(2)}`;
            document.getElementById('waste').innerText = `$${wasted.toFixed(2)}`;
            const r = wasted > 10000 ? "TOTAL LOSS" : wasted > 5000 ? "INSOLVENT WRECK" : "DEBT SLAVE";
            document.getElementById('sub-rank').innerText = r;
            saveAll();
        }

        function switchChat(handle) {
            activeHandle = handle;
            const d = doms.find(x => x.handle === handle);
            document.getElementById('chat-header').innerText = d.name;
            document.getElementById('chat-header').style.color = d.color;
            renderInbox();
            renderMessages();
        }

        function renderInbox() {
            document.getElementById('inbox-list').innerHTML = doms.map(d => `
                <div class="inbox-item ${d.handle === activeHandle ? 'active' : ''} ${pendingDistraction === d.handle ? 'ping' : ''}" onclick="switchChat('${d.handle}')">
                    <img src="${d.pfp}"><div><strong>${d.name}</strong></div>
                </div>`).join('');
        }

        function renderMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = (histories[activeHandle] || []).map(m => `<div class="msg ${m.role === 'user' ? 'user-msg' : 'dom-msg'}">${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendChat() {
            const input = document.getElementById('chat-in');
            if(!input.value || balance < 10) return;
            const val = input.value; input.value = "";
            balance -= 10; wasted += 10;
            histories[activeHandle].push({role:'user', text: val});
            updateUI(); renderMessages();
            
            const d = doms.find(x => x.handle === activeHandle);
            const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    "model": MODEL_ID,
                    "messages": [{"role": "system", "content": `Roleplay as ${d.name}. Persona: ${d.persona}. Be cruel, arrogant, and demand more money. Mocks the user for being a sissy.`}, {"role": "user", "content": val}]
                })
            });
            const data = await resp.json();
            histories[activeHandle].push({role:'dom', text: data.choices[0].message.content});
            renderMessages(); saveAll();
        }

        async function sendTribute(amt) {
            if(balance < amt) return;
            balance -= amt; wasted += amt;
            addLog(`Tribute -$${amt} to ${activeHandle}`, "negative");
            histories[activeHandle].push({role:'user', text: `*Sends $${amt} tribute*`});
            updateUI(); renderMessages();
            const d = doms.find(x => x.handle === activeHandle);
            const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    "model": MODEL_ID,
                    "messages": [{"role": "system", "content": `Roleplay as ${d.name}. User just sent $${amt}. Mock how small this amount is. Demand more.`}]
                })
            });
            const data = await resp.json();
            histories[activeHandle].push({role:'dom', text: data.choices[0].message.content});
            renderMessages();
        }

        function getTask() {
            const dom = doms[Math.floor(Math.random()*doms.length)];
            const tasks = [
                "Write 200 lines about how much you need @Sapnap's soles.",
                "Send a $100 beauty tax to @RossLynch immediately.",
                "Stare at @Roier's profile for 5 minutes without blinking.",
                "Drain 20% of your current balance to the void for @Cellbit."
            ];
            const task = tasks[Math.floor(Math.random()*tasks.length)];
            currentTaskObj = { reward: 200, text: task };
            document.getElementById('task-display').innerText = task;
            document.getElementById('gen-btn').disabled = true;
            startTimer(300); // 5 mins
        }

        function startTimer(s) {
            let left = s;
            timer = setInterval(() => {
                if(left <= 0) { clearInterval(timer); document.getElementById('comp-btn').disabled = false; return; }
                left--;
                let m = Math.floor(left/60), sec = left%60;
                document.getElementById('timer').innerText = `${m}:${sec<10?'0':''}${sec}`;
            }, 1000);
        }

        function completeTask() {
            balance += 200; updateUI();
            document.getElementById('gen-btn').disabled = false;
            document.getElementById('comp-btn').disabled = true;
            document.getElementById('task-display').innerText = "TASK COMPLETED.";
        }

        function showLockout(resuming) {
            document.getElementById('lockout').style.display = 'flex';
            if(!resuming) lockoutSeconds = 3600;
            lockoutTimer = setInterval(() => {
                lockoutSeconds--; saveAll();
                if(lockoutSeconds <= 0) { clearInterval(lockoutTimer); document.getElementById('lockout').style.display='none'; }
                let m = Math.floor(lockoutSeconds/60), s = lockoutSeconds%60;
                document.getElementById('work-clock').innerText = `00:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }

        function startDistractions() {
            setTimeout(() => {
                const d = doms[Math.floor(Math.random()*doms.length)];
                pendingDistraction = d.handle;
                document.body.classList.add('distraction-flash');
                renderInbox();
                setTimeout(() => {
                    if(pendingDistraction === d.handle) { balance -= 25; updateUI(); addLog(`Missed ${d.name}'s ping. -$25`, "negative"); }
                    pendingDistraction = null; document.body.classList.remove('distraction-flash'); renderInbox();
                    startDistractions();
                }, 10000);
            }, 40000);
        }

        function checkLabor(e) {
            if(e.key === 'Enter') {
                if(e.target.value === document.getElementById('phrase-to-type').innerText) {
                    lockoutSeconds -= 60; addLog("Labor accepted.", "positive");
                } else { lockoutSeconds += 120; }
                e.target.value = "";
            }
        }
    </script>
</body>
</html>
