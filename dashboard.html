            if (balance < amount) { addLog("INSUFFICIENT FUNDS.", "negative"); return; }

            histories[activeHandle].push({ role: 'user', text: `*TRIBUTE SENT: $${amount}*` });
            updateUI(); renderMessages();
            const d = doms.find(x => x.handle === activeHandle);
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": MODEL_ID,
                        "messages": [{"role": "system", "content": d.persona}, {"role": "user", "content": `I just gave you $${amount}.`}]
                    })
                });
                const data = await response.json();
                histories[activeHandle].push({ role: 'dom', text: data.choices[0].message.content });
                saveAll(); renderMessages();
            } catch (e) {}
        }

        function getTask() {
            const dom = doms[Math.floor(Math.random()*doms.length)];
            const temp = taskTemplates[Math.floor(Math.random()*taskTemplates.length)];
            const mins = [10, 20, 30][Math.floor(Math.random()*3)];
            currentTaskObj = { handle: dom.handle, endTime: Date.now() + (mins*60*1000), reward: temp.reward, text: temp.text.replace("${dom}", dom.handle).replace("${time}", mins) };
            addLog(`NEW ORDER FROM ${dom.handle}`, "positive");
            document.getElementById('task-display').innerText = currentTaskObj.text;
            document.getElementById('gen-btn').disabled = true; document.body.classList.add('ruining-active');
            saveAll(); switchChat(dom.handle); startTimer(mins * 60);
        }

        function startTimer(seconds) {
            let timeLeft = seconds; clearInterval(timer);
            timer = setInterval(() => {
                if(timeLeft <= 0) { clearInterval(timer); document.getElementById('comp-btn').disabled = false; return; }
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }

        function completeTask() {
            let reward = currentTaskObj.reward;
            if (localStorage.getItem('isPremium') === 'true') { reward *= 2; addLog("2x PREMIUM MULTIPLIER!", "positive"); }
            balance += reward; 
            addLog(`TASK COMPLETE: +$${reward}`, "positive");
            currentTaskObj = null;
            updateUI(); document.getElementById('gen-btn').disabled = false; document.getElementById('comp-btn').disabled = true;
            document.body.classList.remove('ruining-active'); document.getElementById('task-display').innerText = "SYSTEM READY.";
        }

        function triggerTotalRuin() { 
            addLog("BANKRUPTCY TRIGGERED.", "negative");
            clearInterval(timer); balance = 0; showLockout(); updateUI(); 
        }
        
        function showLockout(isResuming = false) {
            document.getElementById('lockout').style.display = 'flex';
            if (!isResuming) lockoutSeconds = 3600;
            clearInterval(lockoutTimer);
            lockoutTimer = setInterval(() => {
                if (lockoutSeconds <= 0) {
                    clearInterval(lockoutTimer); balance = 1000; lockoutSeconds = 0;
                    document.getElementById('lockout').style.display = 'none'; updateUI();
                } else {
                    lockoutSeconds--; localStorage.setItem('lockoutTime', lockoutSeconds);
                    let m = Math.floor(lockoutSeconds/60), s = lockoutSeconds%60;
                    document.getElementById('work-clock').innerText = `00:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
                }
            }, 1000);
        }

        function checkLabor(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('labor-input');
                if (input.value === document.getElementById('phrase-to-type').innerText) {
                    linesDone++; lockoutSeconds = Math.max(0, lockoutSeconds - 60);
                    document.getElementById('phrase-to-type').innerText = ["I am a bankrupt slave.", "My wallet is empty.", "I failed.", "I am pathetic."][Math.floor(Math.random()*4)];
                } else { lockoutSeconds += 120; }
                input.value = ""; document.getElementById('labor-stats').innerText = `Lines Processed: ${linesDone}`;
                saveAll();
            }
        }

        function startDistractions() {
            setTimeout(() => {
                // PROTECTION CHECK
                const protectUntil = localStorage.getItem('protectionUntil') || 0;
                if (Date.now() < protectUntil) { startDistractions(); return; }            
    </script>
</body>
