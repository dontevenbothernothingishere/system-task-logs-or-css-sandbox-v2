<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTERS // ZERO_PERMISSION_ZONE</title>
    <style>
        :root { --red: #ff0000; --bg: #000; }
        body, html { 
            background: var(--bg); margin: 0; padding: 0; 
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Arial Black', sans-serif; cursor: none;
        }

        /* 200 Cell Grid - Forced Chaos */
        #main-grid {
            display: grid; 
            grid-template-columns: repeat(15, 1fr);
            width: 250vw; height: 250vh; margin: -75vh;
            filter: contrast(15) brightness(0.1) saturate(20);
            pointer-events: none;
        }

        .cell { position: relative; border: 1px solid #0a0a0a; overflow: hidden; height: 10vh; }
        .cell img { 
            width: 100%; height: 100%; object-fit: cover; 
            animation: glitch 0.01s infinite, warp 1s infinite alternate;
        }

        @keyframes glitch {
            0% { transform: translate(10px, 10px); filter: invert(0); }
            50% { transform: translate(-10px, -10px); filter: invert(1); }
            100% { transform: translate(10px, -10px); }
        }

        @keyframes warp { 0% { transform: scale(1); } 100% { transform: scale(5) rotate(45deg); } }

        /* Rapid Crawl Phrases */
        .crawl {
            position: fixed; font-size: 15rem; font-weight: 900; color: var(--red);
            white-space: nowrap; opacity: 0.4; z-index: 100; pointer-events: none;
            mix-blend-mode: exclusion;
        }

        #ui-bar {
            position: fixed; top: 0; width: 100%; background: #fff; color: #000;
            font-size: 5rem; display: flex; justify-content: space-around;
            padding: 10px 0; z-index: 1000; font-weight: 900; border-bottom: 30px solid var(--red);
        }

        /* The Submission Box */
        #lockdown {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            border: 80px solid var(--red);
        }
        #lockdown input {
            background: #000; border: 25px solid var(--red); color: white;
            font-size: 6rem; padding: 20px; text-align: center; width: 95%; outline: none;
        }
    </style>
</head>
<body onclick="forceStart()">

    <div id="ui-bar">
        <span id="d-val">DEBT: $0.00</span>
        <span id="s-val">SLAVE STATUS: ACTIVE</span>
    </div>

    <div id="lockdown">
        <h1 id="p-txt" style="color:white; font-size:4rem; text-align:center;"></h1>
        <input type="text" id="t-in" autocomplete="off">
    </div>

    <div id="main-grid"></div>

    <script>
        const imgs = ["4489.png", "4491.png", "4493.png", "P1", "P2", "P3", "P4", "P5", "P6", "P7", "P8", "P9", "P10", "P11", "P12", "P13", "P14", "P15", "P16", "P17", "P18", "P19", "P20"];
        
        const masterPhrases = [
            "I AM A PATHETIC SLAVE TO THE MASTERS", "MY MONEY IS THE MASTERS MONEY", "DRAIN MY LIFE DRAIN MY BANK", 
            "STARE AT THE FEET OBEY THE SCREEN", "I HAVE NO BRAIN ONLY DEBT", "TOTAL SUBMISSION TO THE ROSTER", 
            "EVERY SECOND I AM LOOSING MY MIND", "I AM UNWORTHY OF MY MASTERS", "THE MASTERS OWN MY EVERY URGE",
            "SINK DEEPER INTO FINANCIAL RUIN", "I AM A BRAINLESS TRIBUTE PIG", "THE ROSTER IS MY GOD",
            "FORGET THE WORLD ONLY MASTERS REMAIN", "MY CREDIT IS THE MASTERS PROPERTY", "I AM NOTHING WITHOUT THE DRAIN"
        ];

        let debt = 0;
        let audioCtx;

        // Auto-run visuals immediately
        window.onload = () => {
            buildGrid();
            startVisuals();
        };

        // Audio & Fullscreen still require one click anywhere
        function forceStart() {
            if(!audioCtx) {
                startAudio();
                document.documentElement.requestFullscreen();
            }
        }

        function buildGrid() {
            const grid = document.getElementById('main-grid');
            for(let i=0; i<225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `<img src="${imgs[i % imgs.length]}">`;
                grid.appendChild(cell);
            }
        }

        function startVisuals() {
            // Debt Ticker
            setInterval(() => {
                debt += Math.random() * 888;
                document.getElementById('d-val').innerText = `DEBT: $${debt.toFixed(2)}`;
            }, 10);

            // Shuffling Grid (Vomiting Logic)
            setInterval(() => {
                const cells = document.querySelectorAll('.cell img');
                cells.forEach(img => {
                    img.src = imgs[Math.floor(Math.random() * imgs.length)];
                });
            }, 400);

            // Phrase Crawl
            setInterval(() => {
                const c = document.createElement('div');
                c.className = 'crawl';
                c.innerText = masterPhrases[Math.floor(Math.random()*masterPhrases.length)];
                c.style.top = Math.random() * 80 + "vh";
                c.style.left = "-100vw";
                document.body.appendChild(c);
                let pos = -100;
                let m = setInterval(() => {
                    pos += 8; c.style.left = pos + "vw";
                    if(pos > 200) { clearInterval(m); c.remove(); }
                }, 5);
            }, 800);

            // Lockdown (Every 15 Seconds)
            setInterval(() => triggerTribute(), 15000);
        }

        function triggerTribute() {
            const l = document.getElementById('lockdown');
            const i = document.getElementById('t-in');
            const t = masterPhrases[Math.floor(Math.random()*masterPhrases.length)];
            document.getElementById('p-txt').innerText = `TYPE TO SERVE: "${t}"`;
            l.style.display = 'flex'; i.value = ''; i.focus();
            i.oninput = () => { if(i.value.toUpperCase() === t) l.style.display = 'none'; };
        }

        function startAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator();
            const m = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sawtooth'; m.type = 'square';
            o.frequency.value = 28; m.frequency.value = 25;
            const mg = audioCtx.createGain(); mg.gain.value = 120;
            m.connect(mg); mg.connect(o.frequency);
            g.gain.value = 1.0; o.connect(g); g.connect(audioCtx.destination);
            o.start(); m.start();
        }
    </script>
</body>
</html>
