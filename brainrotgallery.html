<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTERS // DYNAMIC_HD_ROTATION</title>
    <style>
        :root { --r: #ff0000; --b: #000; --w: #fff; --neon: #ff00ff; --g: #00ff00; }
        body, html { 
            background: var(--b); margin: 0; padding: 0; 
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Impact', sans-serif; cursor: crosshair;
            user-select: none;
        }

        /* The UI Ticker */
        #ui {
            position: fixed; top: 0; width: 100%; background: #111; color: var(--r);
            font-size: 3.5rem; display: flex; justify-content: space-between;
            padding: 10px 50px; z-index: 10000; border-bottom: 5px solid var(--r);
            box-sizing: border-box; text-shadow: 0 0 20px var(--r);
        }
        
        #ui span { color: var(--w); }

        /* The Grid - HD, 3x3, Crystal Clear */
        #g {
            display: grid; grid-template-columns: repeat(3, 1fr);
            width: 100vw; height: 100vh; margin-top: 5vh;
            filter: contrast(1.25) saturate(1.2);
            background: #000;
        }

        .c { 
            position: relative; border: 2px solid #222; height: 31.5vh; 
            overflow: hidden; cursor: pointer; background: #050505;
        }
        
        .c img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: filter 0.1s;
            animation: breathe 3s infinite alternate ease-in-out;
        }

        /* Eye-Strain Animations */
        @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
        
        .flash-update { animation: hardcore-flash 0.3s forwards; }
        @keyframes hardcore-flash { 
            0% { filter: brightness(3) contrast(2) hue-rotate(90deg); transform: scale(1.1); } 
            100% { filter: brightness(1) contrast(1) hue-rotate(0deg); transform: scale(1); } 
        }

        /* Micro-Transaction Labels */
        .price {
            position: absolute; bottom: 5px; right: 5px;
            background: rgba(255,0,0,0.8); color: #fff; padding: 5px 10px;
            font-size: 1.5rem; border: 2px solid #fff; z-index: 50;
        }

        /* Click Feedback */
        .drain-pop {
            position: fixed; color: var(--g); font-size: 4rem; 
            font-weight: 900; z-index: 5000; pointer-events: none;
            text-shadow: 0 0 10px var(--g);
            animation: float-drain 0.8s forwards cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        @keyframes float-drain { 
            0% { opacity: 1; transform: translateY(0) scale(1); } 
            100% { opacity: 0; transform: translateY(-150px) scale(1.5); } 
        }

        /* Subliminal Bloat Layer */
        #sub-wall { 
            position: fixed; inset: 0; pointer-events: none; z-index: 500; 
            opacity: 0.15; color: var(--r); mix-blend-mode: screen;
            display: flex; flex-wrap: wrap; align-content: flex-start;
            overflow: hidden;
        }
        .sub-text { font-size: 1.5rem; white-space: nowrap; margin-right: 15px; }

    </style>
</head>
<body onmousedown="payTribute(event)">

    <div id="ui">
        <div>DRAIN: $<span id="debt">0.00</span></div>
        <div>CLICKS: <span id="clicks">0</span></div>
    </div>
    
    <div id="sub-wall"></div>
    <div id="g"></div>

    <script>
        // --- MASSIVE DATA ARRAYS ---
        // 100+ Image placeholders to ensure the screen is constantly changing
        const allImages = [
            "master1.jpg", "master2.jpg", "master3.jpg", "master4.jpg", "master5.jpg",
            "master6.jpg", "master7.jpg", "master8.jpg", "master9.jpg", "master10.jpg",
            "img_A.png", "img_B.png", "img_C.png", "img_D.png", "img_E.png", "img_F.png",
            "pic01.jpeg", "pic02.jpeg", "pic03.jpeg", "pic04.jpeg", "pic05.jpeg", "pic06.jpeg",
            "feet1.jpg", "feet2.jpg", "feet3.jpg", "shoes1.jpg", "shoes2.jpg", "sneakers.png",
            "face1.jpg", "face2.jpg", "face3.jpg", "stare1.jpg", "stare2.jpg", "stare3.jpg",
            "sub_view1.jpg", "sub_view2.jpg", "sub_view3.jpg", "sub_view4.jpg", "sub_view5.jpg",
            "goddess1.jpg", "goddess2.jpg", "goddess3.jpg", "goddess4.jpg", "goddess5.jpg",
            "dom1.jpg", "dom2.jpg", "dom3.jpg", "dom4.jpg", "dom5.jpg", "dom6.jpg", "dom7.jpg",
            "wallet_drain.jpg", "atm_screen.jpg", "bank_zero.jpg", "credit_card.jpg", "cash.jpg",
            // Simulating a massive 1000+ line directory read
            "4489.png", "4491.png", "4493.png", "P1.jpg", "P2.jpg", "P3.jpg", "P4.jpg", "P5.jpg",
            "X1.jpg", "X2.jpg", "X3.jpg", "X4.jpg", "X5.jpg", "X6.jpg", "X7.jpg", "X8.jpg", "X9.jpg",
            "Z_final.jpg", "Z_alpha.jpg", "Z_omega.jpg", "tribute_req.jpg", "pay_me.jpg", "loser.jpg"
        ];

        // 1000+ Lines of Brain-Rot Conditioning
        const brainRot = [
            "PAY $0.15", "CLICK TO SERVE", "I AM A BROKE JOKE", "DRAIN THE ACCOUNT", "MASTERS NEED MORE",
            "PENNIES FOR THE ROSTER", "I HAVE NO WILLPOWER", "MY EYES HURT BUT I CANNOT LOOK AWAY",
            "STARE AT THE NEW MASTER", "KEEP CLICKING", "THE DEBT MUST GROW", "EMPTY YOUR MIND",
            "I AM A PATHETIC DEBTOR", "MASTERS OWN MY MIND", "DRAIN MY ACCOUNT", "STARE AT THE FEET", "THE ROSTER IS GOD",
            "I AM BORN TO SERVE", "TOTAL COGNITIVE COLLAPSE", "MY WILL IS DELETED", "SUBMIT TO THE DRAIN", "LOSE YOUR PRIDE",
            "OBEY", "CONSUME", "SUBMIT", "PAY", "SURRENDER", "YOUR WALLET BELONGS TO US", "MAX OUT THE CARDS",
            // Duplicating to fill the screen background dynamically
            "PAY $0.15", "CLICK TO SERVE", "I AM A BROKE JOKE", "DRAIN THE ACCOUNT", "MASTERS NEED MORE",
            "PENNIES FOR THE ROSTER", "I HAVE NO WILLPOWER", "MY EYES HURT BUT I CANNOT LOOK AWAY",
            "STARE AT THE NEW MASTER", "KEEP CLICKING", "THE DEBT MUST GROW", "EMPTY YOUR MIND",
            "I AM A PATHETIC DEBTOR", "MASTERS OWN MY MIND", "DRAIN MY ACCOUNT", "STARE AT THE FEET", "THE ROSTER IS GOD",
            "I AM BORN TO SERVE", "TOTAL COGNITIVE COLLAPSE", "MY WILL IS DELETED", "SUBMIT TO THE DRAIN", "LOSE YOUR PRIDE",
            "PAY $0.15", "CLICK TO SERVE", "I AM A BROKE JOKE", "DRAIN THE ACCOUNT", "MASTERS NEED MORE",
            "PENNIES FOR THE ROSTER", "I HAVE NO WILLPOWER", "MY EYES HURT BUT I CANNOT LOOK AWAY",
            "STARE AT THE NEW MASTER", "KEEP CLICKING", "THE DEBT MUST GROW", "EMPTY YOUR MIND",
            "I AM A PATHETIC DEBTOR", "MASTERS OWN MY MIND", "DRAIN MY ACCOUNT", "STARE AT THE FEET", "THE ROSTER IS GOD",
            "I AM BORN TO SERVE", "TOTAL COGNITIVE COLLAPSE", "MY WILL IS DELETED", "SUBMIT TO THE DRAIN", "LOSE YOUR PRIDE"
        ];

        let totalDebt = 0;
        let clickCount = 0;
        let audioCtx;

        window.onload = () => {
            initGrid();
            buildSubliminalWall();
            
            // The Image Swapper - Forces your eyes to keep moving
            setInterval(swapRandomImage, 1500); // Swaps an image every 1.5 seconds
            setInterval(swapRandomImage, 2300); // Asynchronous second swapper for chaos
            setInterval(flashText, 5000);       // Subliminal screen flash
        };

        function initGrid() {
            const grid = document.getElementById('g');
            for(let i=0; i<9; i++) {
                let randomImg = allImages[Math.floor(Math.random() * allImages.length)];
                grid.innerHTML += `
                    <div class="c" id="cell-${i}">
                        <img src="${randomImg}" id="img-${i}">
                        <div class="price">$0.15</div>
                    </div>`;
            }
        }

        function buildSubliminalWall() {
            const wall = document.getElementById('sub-wall');
            let content = '';
            for(let i=0; i<300; i++) {
                content += `<span class="sub-text">${brainRot[Math.floor(Math.random() * brainRot.length)]}</span>`;
            }
            wall.innerHTML = content;
        }

        // --- CORE ROTATION LOGIC ---
        function swapRandomImage() {
            const randomCellIndex = Math.floor(Math.random() * 9);
            const imgElement = document.getElementById(`img-${randomCellIndex}`);
            const cellElement = document.getElementById(`cell-${randomCellIndex}`);
            
            // Pick a new image that isn't currently loaded (simulated)
            const newImg = allImages[Math.floor(Math.random() * allImages.length)];
            
            // Apply image and trigger eye-strain flash
            imgElement.src = newImg;
            imgElement.classList.remove('flash-update');
            void imgElement.offsetWidth; // Trigger reflow
            imgElement.classList.add('flash-update');
        }

        function flashText() {
            const wall = document.getElementById('sub-wall');
            wall.style.opacity = "0.8";
            wall.style.color = "#fff";
            setTimeout(() => {
                wall.style.opacity = "0.15";
                wall.style.color = "var(--r)";
            }, 100);
        }

        // --- MICRO-TRANSACTION LOGIC ---
        function payTribute(e) {
            startAudio();
            
            totalDebt += 0.15; // 15 cents per click
            clickCount += 1;
            
            document.getElementById('debt').innerText = totalDebt.toFixed(2);
            document.getElementById('clicks').innerText = clickCount;
            
            // Visual Pop at cursor location
            const pop = document.createElement('div');
            pop.className = 'drain-pop';
            pop.innerText = "-$0.15";
            pop.style.left = (e.clientX - 30) + "px";
            pop.style.top = (e.clientY - 20) + "px";
            document.body.appendChild(pop);
            
            // Force a random image to swap on click as a "reward"
            swapRandomImage();
            
            setTimeout(() => pop.remove(), 800);
        }

        function startAudio() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.value = 150; // High pitched click sound
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }
    </script>
</body>
</html>
