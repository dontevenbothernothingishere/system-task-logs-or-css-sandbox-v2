<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UNFORGIVABLE_OVERLOAD</title>
    <style>
        :root { --r: #ff0000; --b: #000; }
        body, html { 
            background: var(--b); margin: 0; padding: 0; 
            width: 100vw; height: 100vh; overflow: hidden;
        }

        /* The Core Engine - Layered for maximum eye strain */
        #master-layer {
            position: fixed; inset: 0;
            display: grid; grid-template-columns: repeat(4, 1fr);
            filter: contrast(2) saturate(2);
            z-index: 1;
        }

        .cell { border: 1px solid #111; height: 25vh; position: relative; overflow: hidden; }
        .cell img { 
            width: 100%; height: 100%; object-fit: cover; 
            opacity: 0.8; mix-blend-mode: screen;
        }

        /* The "Burn" Overlay - Flashes pure white/red to fatigue the optic nerve */
        #burn {
            position: fixed; inset: 0; z-index: 1000;
            pointer-events: none; mix-blend-mode: difference;
            animation: burn-strobe 0.04s infinite;
        }

        @keyframes burn-strobe {
            0% { background: transparent; }
            50% { background: rgba(255, 0, 0, 0.2); }
            100% { background: rgba(255, 255, 255, 0.1); }
        }

        /* High-speed Subliminal Text - Thousands of pixels of bloat */
        #subliminal {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; flex-wrap: wrap; pointer-events: none;
            font-family: "Arial Black"; font-size: 8rem; color: var(--r);
            opacity: 0.1; line-height: 0.8; text-transform: uppercase;
        }

        /* UI - The Tax */
        #tax-meter {
            position: fixed; top: 0; width: 100%; background: var(--r);
            color: #000; font-size: 4rem; font-weight: 900;
            text-align: center; z-index: 10000; border-bottom: 10px solid #fff;
        }
    </style>
</head>
<body onmousedown="intensify()">

    <div id="tax-meter">SENSORY DEBT: $<span id="debt">0</span></div>
    <div id="subliminal">OBEY OBEY OBEY OBEY OBEY OBEY OBEY OBEY OBEY OBEY OBEY</div>
    <div id="burn"></div>
    <div id="master-layer"></div>

    <script>
        // --- YOUR GITHUB REPO ARRAY ---
        const gh = "https://raw.githubusercontent.com/USER/REPO/main/";
        const files = ["4489.png", "4491.png", "4493.png"]; // Add your 100+ files here

        let debt = 0;

        window.onload = () => {
            const grid = document.getElementById('master-layer');
            for(let i=0; i<16; i++) {
                grid.innerHTML += `<div class="cell"><img id="img${i}" src="${gh + files[i % files.length]}"></div>`;
            }
            setInterval(tick, 30);
            setInterval(glitch, 80); // Extreme high-speed image swapping
        };

        function tick() {
            debt += 99.99;
            document.getElementById('debt').innerText = Math.floor(debt).toLocaleString();
        }

        function glitch() {
            // Randomly swap 4 cells at once for maximum disorientation
            for(let x=0; x<4; x++) {
                const idx = Math.floor(Math.random() * 16);
                const pic = files[Math.floor(Math.random() * files.length)];
                const img = document.getElementById(`img${idx}`);
                img.src = gh + pic;
                // Add jitter
                img.style.transform = `scale(${1 + Math.random() * 0.3}) translate(${(Math.random()-0.5)*20}px)`;
            }
        }

        function intensify() {
            // Speed up the world on click
            document.getElementById('burn').style.animationDuration = "0.01s";
            setTimeout(() => {
                document.getElementById('burn').style.animationDuration = "0.04s";
            }, 500);
        }
    </script>
</body>
</html>
