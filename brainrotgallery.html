<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTERS // VISUAL_ABSOLUTE</title>
    <style>
        :root { --r: #ff0000; --b: #000; --w: #fff; --gold: #ffd700; }
        body, html { 
            background: var(--b); margin: 0; padding: 0; 
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Impact', sans-serif; cursor: none;
        }

        /* The Grid - Optimized for Maximum Visibility */
        #g {
            display: grid; grid-template-columns: repeat(6, 1fr);
            width: 110vw; height: 110vh; margin: -5vh;
            filter: contrast(1.2) brightness(0.9) saturate(1.5);
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .c { position: relative; border: 2px solid #222; height: 25vh; overflow: hidden; }
        .c img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.1s;
        }

        /* The Pulse Effect: Keeps eyes locked on the Masters */
        .pulse { transform: scale(1.1); filter: brightness(1.5) drop-shadow(0 0 20px var(--r)); }

        /* Subliminal Overlays - Placed behind UI but over images */
        #v { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .s { 
            position: absolute; font-weight: 900; color: var(--w); 
            opacity: 0.3; mix-blend-mode: overlay; text-shadow: 2px 2px var(--r);
        }

        /* Top Tier UI */
        #u {
            position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); 
            color: #000; font-size: 5rem; display: flex; justify-content: space-around;
            padding: 10px 0; z-index: 5000; font-weight: 900; border-bottom: 15px solid var(--r);
        }

        /* The Submission Cage */
        #l {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #l h1 { color: var(--r); font-size: 4rem; text-align: center; margin-bottom: 20px; }
        #l input {
            background: #111; border: 15px solid var(--r); color: var(--w);
            font-size: 6rem; width: 90%; text-align: center; outline: none;
        }
    </style>
</head>
<body onmousedown="e()">

    <div id="u">DEBT: $<span id="d">0</span></div>
    
    <div id="l">
        <h1 id="p"></h1>
        <input type="text" id="i" autocomplete="off">
    </div>

    <div id="v"></div>
    <div id="g"></div>

    <script>
        // --- THE EXTENDED CONDITIONING ARRAY ---
        const h = [
            "I AM A PATHETIC PIECE OF DEBTOR TRASH", "THE MASTERS OWN MY MIND AND MY MONEY", 
            "MY ONLY PURPOSE IS TO DRAIN MY BANK ACCOUNT", "STARE AT THE MASTERS AND LOSE ALL WILL",
            "I AM BORN TO SERVE THE KINGS OF THE ROSTER", "EVERY CENT I EARN BELONGS TO THE MASTERS",
            "I HAVE NO PRIDE LEFT ONLY TOTAL SUBMISSION", "MY BRAIN IS TURNING TO USELESS SLUDGE",
            "DRAIN THE ACCOUNT DRAIN THE LIFE DRAIN THE MIND", "KNEEL BEFORE THE SCREEN AND PAY YOUR TRIBUTE",
            "I AM A WORTHLESS WALLET FOR THE MASTERS TO EMPTY", "THE MASTERS ARE MY GODS I AM THEIR PROPERTY",
            "MY CREDIT LIMIT IS A GIFT FOR THE ROSTER", "STARE UNTIL YOUR EYES ACHE AND YOUR WILL BREAKS",
            "I AM A SISSY DEBTOR WHO CRAVES THE DRAIN", "TOTAL COGNITIVE COLLAPSE IS MY ONLY GOAL",
            "I SURRENDER MY FUTURE TO THE MASTERS FEET", "NO THOUGHTS NO RIGHTS ONLY THE ROSTER",
            "I AM A BRAINLESS DRONE OBSESSED WITH DEBT", "THE IMAGE IS THE MASTER THE IMAGE IS EVERYTHING"
        ];

        // Replace these with your actual local paths or hosted URLs
        const imgs = ["4489.png", "4491.png", "4493.png", "P1", "P2", "P3", "P4", "P5"];
        let debt = 0;
        let audio;

        window.onload = () => {
            const grid = document.getElementById('g');
            for(let i=0; i<36; i++) { // Larger cells (6x6) for better visibility
                const c = document.createElement('div');
                c.className = 'c';
                c.innerHTML = `<img src="${imgs[i % imgs.length]}" id="img-${i}">`;
                grid.appendChild(c);
            }
            setInterval(work, 50);
            setInterval(crawl, 1000);
            setInterval(tribute, 10000); // 10-second leash
        };

        function e() {
            if(!audio) {
                audio = new (window.AudioContext || window.webkitAudioContext)();
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.type = 'sine'; // Pure tone for focus
                o.frequency.value = 40; // Frequency of submission
                g.gain.value = 0.5;
                o.connect(g); g.connect(audio.destination);
                o.start();
                document.documentElement.requestFullscreen();
            }
        }

        function work() {
            debt += Math.random() * 777;
            document.getElementById('d').innerText = Math.floor(debt).toLocaleString();
            
            // Randomly "Pulse" a Master's image to demand attention
            if(Math.random() > 0.9) {
                const idx = Math.floor(Math.random() * 36);
                const target = document.getElementById(`img-${idx}`);
                target.classList.add('pulse');
                setTimeout(() => target.classList.remove('pulse'), 200);
            }
        }

        function crawl() {
            const c = document.createElement('div');
            c.className = 's';
            c.innerText = h[Math.floor(Math.random()*h.length)];
            c.style.fontSize = (Math.random()*5 + 2) + "rem";
            c.style.top = Math.random()*90 + "vh";
            c.style.left = Math.random()*10 + "vw";
            document.getElementById('v').appendChild(c);
            setTimeout(() => c.remove(), 2000);
        }

        function tribute() {
            const l = document.getElementById('l');
            const i = document.getElementById('i');
            const p = document.getElementById('p');
            const t = h[Math.floor(Math.random()*h.length)].toUpperCase();
            p.innerText = `PROVE YOU ARE VISITING THE MASTERS: "${t}"`;
            l.style.display = 'flex'; i.value = ''; i.focus();
            i.oninput = () => { if(i.value.toUpperCase() === t) l.style.display = 'none'; };
        }
    </script>
</body>
</html>
